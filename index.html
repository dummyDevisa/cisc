<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CISC Belém | Documentação Técnica</title>
    
    <!-- SEO -->
    <meta name="description" content="Portal de documentação técnica e arquitetura do Centro de Informação em Saúde e Clima (CISC) de Belém.">
    <link rel="canonical" href="https://github.com/dummyDevisa/cisc">
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Markdown Rendering & Highlighting -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-python.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-bash.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-sql.min.js"></script>

    <style>
        :root {
            --primary: #00d2ff;
            --secondary: #3a7bd5;
            --accent: #ff007a;
            --bg-dark: #0a0e14;
            --card-bg: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
            --text-main: #e0e6ed;
            --text-dim: #94a3b8;
            --glass: rgba(15, 23, 42, 0.8);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            line-height: 1.6;
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(0, 210, 255, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(255, 0, 122, 0.05) 0%, transparent 40%);
        }

        /* Animated background mesh */
        .bg-mesh {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            opacity: 0.4;
            background: 
                linear-gradient(90deg, var(--bg-dark) 20px, transparent 1%) center,
                linear-gradient(var(--bg-dark) 20px, transparent 1%) center,
                rgba(255, 255, 255, 0.05);
            background-size: 22px 22px;
        }

        header {
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 5%;
            position: sticky;
            top: 0;
            z-index: 100;
            background: var(--glass);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
        }

        .logo {
            font-family: 'Outfit', sans-serif;
            font-size: 1.5rem;
            font-weight: 800;
            background: linear-gradient(to right, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo i {
            -webkit-text-fill-color: var(--primary);
        }

        .nav-links {
            display: flex;
            gap: 25px;
        }

        .nav-links a {
            color: var(--text-dim);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .nav-links a:hover {
            color: var(--primary);
            text-shadow: 0 0 10px rgba(0, 210, 255, 0.5);
        }

        main {
            max-width: 1000px;
            margin: 40px auto;
            padding: 0 20px;
        }

        #content-wrapper {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 60px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            position: relative;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Markdown Styles */
        #content h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 3rem;
            margin-bottom: 2rem;
            background: linear-gradient(to right, #fff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1.2;
        }

        #content h2 {
            font-family: 'Outfit', sans-serif;
            font-size: 1.8rem;
            margin: 3rem 0 1.5rem;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 15px;
        }

        #content h2::after {
            content: '';
            flex: 1;
            height: 1px;
            background: linear-gradient(to right, var(--border), transparent);
        }

        #content blockquote {
            border-left: 4px solid var(--accent);
            background: rgba(255, 0, 122, 0.05);
            padding: 20px 30px;
            margin: 30px 0;
            border-radius: 0 15px 15px 0;
            color: #d1d5db;
            font-style: italic;
        }

        #content p {
            margin-bottom: 1.5rem;
            color: #cbd5e1;
            font-size: 1.1rem;
        }

        #content ul, #content ol {
            margin: 1.5rem 0 1.5rem 2rem;
            color: #cbd5e1;
        }

        #content li {
            margin-bottom: 0.8rem;
        }

        #content a {
            color: var(--primary);
            text-decoration: none;
            border-bottom: 1px solid transparent;
            transition: all 0.2s;
        }

        #content a:hover {
            border-bottom: 1px solid var(--primary);
        }

        /* Tables styling */
        #content table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            margin: 2rem 0;
            border: 1px solid var(--border);
            border-radius: 15px;
            overflow: hidden;
        }

        #content th {
            background: rgba(255,255,255,0.05);
            padding: 15px 20px;
            text-align: left;
            font-family: 'Outfit', sans-serif;
            color: var(--primary);
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 1px;
        }

        #content td {
            padding: 15px 20px;
            border-top: 1px solid var(--border);
            color: #cbd5e1;
        }

        #content tr:hover td {
            background: rgba(255,255,255,0.02);
        }

        /* Code Blocks */
        pre[class*="language-"] {
            border-radius: 15px !important;
            margin: 2rem 0 !important;
            border: 1px solid var(--border) !important;
            background: #0d1117 !important;
        }

        code[class*="language-"] {
            font-size: 0.95rem !important;
        }

        .loading {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 400px;
            color: var(--text-dim);
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(0, 210, 255, 0.1);
            border-top: 3px solid var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        footer {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-dim);
            font-size: 0.85rem;
            border-top: 1px solid var(--border);
            margin-top: 80px;
            background: rgba(0,0,0,0.2);
        }

        /* Responsive */
        @media (max-width: 768px) {
            #content-wrapper { padding: 30px 20px; }
            #content h1 { font-size: 2rem; }
            header { padding: 0 20px; }
            .nav-links { display: none; }
        }
    </style>
</head>
<body>
    <div class="bg-mesh"></div>

    <header>
        <div class="logo">
            <i class="fas fa-microchip"></i>
            <span>CISC BELÉM</span>
        </div>
        <nav class="nav-links">
            <a href="etl_arquitetura.html"><i class="fas fa-project-diagram"></i> Arquitetura</a>
            <a href="devs_etl_detalhado.html"><i class="fas fa-stream"></i> Pipeline</a>
            <a href="hitl_devs_arquitetura.html"><i class="fas fa-brain"></i> HITL</a>
            <a href="cisc_ia_modelagem.html"><i class="fas fa-robot"></i> IA/HTR</a>
            <a href="sala_situacao.html"><i class="fas fa-tv"></i> Sala</a>
            <a href="matriz_alertas.html"><i class="fas fa-bell"></i> Alertas</a>
            <a href="https://github.com/dummyDevisa/cisc" target="_blank"><i class="fab fa-github"></i> GitHub</a>
        </nav>
    </header>

    <main>
        <div id="content-wrapper">
            <div id="loading" class="loading">
                <div class="spinner"></div>
                <p>Renderizando documentação...</p>
            </div>
            <div id="content"></div>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Centro de Informação em Saúde e Clima (CISC) — Belém/PA</p>
        <p style="margin-top: 10px; opacity: 0.5;">Documentação técnica atualizada em tempo real via README.md</p>
    </footer>

    <script>
        async function loadReadme() {
            const contentDiv = document.getElementById('content');
            const loadingDiv = document.getElementById('loading');

            try {
                // Fetch the README.md file
                const response = await fetch('README.md');
                if (!response.ok) throw new Error('Falha ao carregar o README.md');
                
                const markdown = await response.text();
                
                // Set options for marked
                marked.setOptions({
                    breaks: true,
                    gfm: true
                });

                // Render Markdown to HTML
                contentDiv.innerHTML = marked.parse(markdown);
                
                // Hide loading, show content
                loadingDiv.style.display = 'none';
                
                // Re-run Prism for any code blocks
                Prism.highlightAll();

                // Add copy buttons to code blocks
                const preBlocks = contentDiv.querySelectorAll('pre');
                preBlocks.forEach(pre => {
                    const button = document.createElement('button');
                    button.innerHTML = '<i class="far fa-copy"></i>';
                    button.className = 'copy-btn';
                    button.style.position = 'absolute';
                    button.style.top = '10px';
                    button.style.right = '10px';
                    button.style.background = 'rgba(255,255,255,0.1)';
                    button.style.border = 'none';
                    button.style.color = '#fff';
                    button.style.padding = '5px 8px';
                    button.style.borderRadius = '5px';
                    button.style.cursor = 'pointer';
                    button.style.zIndex = '10';
                    
                    pre.style.position = 'relative';
                    pre.appendChild(button);

                    button.addEventListener('click', () => {
                        const code = pre.querySelector('code').innerText;
                        navigator.clipboard.writeText(code);
                        button.innerHTML = '<i class="fas fa-check"></i>';
                        setTimeout(() => {
                            button.innerHTML = '<i class="far fa-copy"></i>';
                        }, 2000);
                    });
                });

                // Add nice icons to headers dynamically
                const headers = contentDiv.querySelectorAll('h2');
                const icons = ['fa-info-circle', 'fa-heartbeat', 'fa-cogs', 'fa-layer-group', 'fa-book-open', 'fa-map-signs'];
                headers.forEach((h, i) => {
                    const icon = document.createElement('i');
                    icon.className = `fas ${icons[i % icons.length]}`;
                    icon.style.marginRight = '12px';
                    icon.style.fontSize = '0.8em';
                    icon.style.opacity = '0.7';
                    h.prepend(icon);
                });

                // Handle links
                const links = contentDiv.querySelectorAll('a');
                links.forEach(link => {
                    const href = link.getAttribute('href');
                    if (href && (href.startsWith('http') || href.startsWith('//'))) {
                        link.setAttribute('target', '_blank');
                        link.setAttribute('rel', 'noopener noreferrer');
                        link.innerHTML += ' <i class="fas fa-external-link-alt" style="font-size: 0.7em; margin-left: 5px; opacity: 0.5;"></i>';
                    }
                });

            } catch (error) {
                console.error(error);
                loadingDiv.innerHTML = `<p style="color: var(--accent)">Erro: ${error.message}</p>`;
            }
        }

        window.onload = loadReadme;
    </script>
</body>
</html>
